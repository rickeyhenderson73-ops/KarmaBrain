manifestVersion: 1
id: brainchainz-monero-superbrain
category: bitcoin
name: Monero Superbrain
version: "1.0.0"
tagline: Mine Monero privately with your own built-in pruned node
description: >-
  Monero Superbrain is a fully self-contained Monero mining powerhouse for
  your Umbrel. No separate Monero node required — it runs its own pruned
  Monero node, P2Pool, XMRig Proxy, and a live node status dashboard all
  in one app.

  The dashboard shows real-time blockchain sync progress so you always know
  exactly where you are. Mining starts automatically once the node is synced.

  Features:
  - Built-in pruned Monero node — syncs trustlessly from scratch (~50GB)
  - Live sync progress dashboard — see block height, peers, sync percentage
  - P2Pool decentralized mining — mini chain by default, no pool fees
  - XMRig CPU miner — enable via XMRIG_ENABLED=true in /data/.env
  - XMRig Proxy — connect external miners at umbrel.local:8888 (algo rx/0)
  - Wallet address set via WALLET_ADDRESS in /data/.env

