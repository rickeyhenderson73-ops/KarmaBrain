manifestVersion: 1
id: brainchainz-monero-superbrain
category: bitcoin
name: Monero Superbrain
version: "1.0.0"
tagline: Mine Monero privately with your own built-in pruned node
description: >-
  Monero Superbrain is a fully self-contained Monero mining powerhouse for
  your Umbrel. No separate Monero node required — it runs its own pruned
  Monero node, P2Pool, XMRig Proxy, and a beautiful dashboard all in one app.

  Just install, enter your wallet address, choose mini or main P2Pool chain,
  and you're mining — fully decentralized with no pool fees.

  Features:
  - Built-in pruned Monero node — syncs trustlessly from scratch, uses a
    fraction of the storage of a full node
  - P2Pool decentralized mining — mini or main chain, your choice
  - XMRig CPU miner — disabled by default, enable from the dashboard
  - XMRig Proxy — connect external miners on your LAN at umbrel.local:8888
  - Beautiful dashboard with theme engine — Hacker green, Monerochan pink,
    Cyberpunk orange, Dark mode
  - Farm Commander — manage multiple rigs from one place
  - Real-time payout tracking via p2pool.observer

